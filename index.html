<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dino Fun Game 🎮</title>

<style>
    body {
        margin: 0; padding: 0;
        background: #000;
        display: flex; justify-content: center; align-items: center;
        height: 100vh; width: 100vw;
        font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        overflow: hidden; touch-action: none;
    }

    #game-container {
        position: relative;
        width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
    }

    canvas {
        width: 100%; height: auto;
        background: #87CEEB; /* Sky Blue Background */
        display: block;
    }

    #flash {
        position: absolute;
        top: 0; left: 0; width: 100%; height: 100%;
        background-color: rgba(255, 255, 255, 0.7); /* Brighter flash for explosion */
        display: none; pointer-events: none; z-index: 5;
    }

    #overlay {
        position: absolute;
        top: 0; left: 0; 
        width: 100%; height: 100%;
        background: rgba(0, 0, 0, 0.9);
        display: none; flex-direction: column;
        justify-content: center; align-items: center;
        color: white; z-index: 10;
        padding: 20px; box-sizing: border-box;
    }

    #friend-photo-container {
        width: 100%; display: flex; justify-content: center; margin-bottom: 25px;
    }

    #friend-photo-container img {
        width: 220px; height: 220px; object-fit: cover;
        border: 8px solid #ffca28;
        box-shadow: 0 0 40px rgba(255, 202, 40, 0.5); 
        animation: pulse 1.5s infinite alternate;
    }

    #players-strip {
        display: flex; justify-content: center; gap: 20px; width: 100%; margin-bottom: 30px;
    }

    .player-card {
        background: rgba(255, 255, 255, 0.1);
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-radius: 15px; padding: 15px; width: 130px; text-align: center;
    }

    .player-card img {
        width: 100px; height: 100px; object-fit: contain;
        display: block; margin: 0 auto 10px auto;
    }

    .player-card span { font-size: 16px; font-weight: bold; color: #ffca28; text-transform: uppercase; }

    @keyframes pulse { 0% { transform: scale(1); } 100% { transform: scale(1.05); } }

    #overlay h2 { font-size: 30px; margin: 0 0 10px 0; text-transform: uppercase; color: #ff4757; }
    #finalScore { font-size: 24px; margin-bottom: 25px; font-weight: bold; }

    button {
        padding: 18px 60px; font-size: 24px; font-weight: bold;
        background: #2ecc71; color: white; border: none;
        border-radius: 50px; cursor: pointer; box-shadow: 0 6px 0 #27ae60;
    }

    button:active { transform: translateY(4px); box-shadow: 0 2px 0 #27ae60; }
</style>
</head>
<body>

<div id="game-container">
    <div id="flash"></div>
    <canvas id="gameCanvas"></canvas>

    <div id="overlay">
        <div id="friend-photo-container"><img src="friend.png" alt="Featured"></div>
        <div id="players-strip">
            <div class="player-card"><img src="dino.png" alt="Player"><span>Player</span></div>
            <div class="player-card"><img src="cactus.png" alt="Enemy"><span>Enemy</span></div>
        </div>
        <h2>BOOM! Game Over</h2>
        <p id="finalScore"></p>
        <button onclick="resetGame()">REPLAY</button>
    </div>
</div>

<audio id="bgMusic" loop><source src="bg.mp3" type="audio/mpeg"></audio>
<audio id="jumpSound"><source src="jump.mp3" type="audio/mpeg"></audio>
<audio id="hitSound"><source src="hit.mp3" type="audio/mpeg"></audio>
<audio id="boomSound"><source src="boom.mp3" type="audio/mpeg"></audio>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const flash = document.getElementById("flash");
const overlay = document.getElementById("overlay");
const finalScoreText = document.getElementById("finalScore");

const LOGICAL_WIDTH = 900;
const LOGICAL_HEIGHT = 450;
const GROUND_Y = 270;

function setupCanvas() {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = LOGICAL_WIDTH * dpr;
    canvas.height = LOGICAL_HEIGHT * dpr;
    ctx.scale(dpr, dpr);
}

const dinoImg = new Image(); dinoImg.src = "dino.png";
const cactusImg = new Image(); cactusImg.src = "cactus.png";
const music = document.getElementById("bgMusic");
const jumpSound = document.getElementById("jumpSound");
const hitSound = document.getElementById("hitSound");
const boomSound = document.getElementById("boomSound");

let flashTimeout, boomTimeout;
let shakeAmount = 0;
let particles = [];
let cloudX = 0;

class Particle {
    constructor(x, y) {
        this.x = x; this.y = y;
        this.size = Math.random() * 10 + 5;
        this.speedX = (Math.random() - 0.5) * 20;
        this.speedY = (Math.random() - 0.5) * 20;
        this.color = Math.random() > 0.5 ? "#ff4757" : "#ffa502"; // Explosion colors
        this.life = 1.0;
    }
    update() {
        this.x += this.speedX; this.y += this.speedY;
        this.life -= 0.02;
    }
    draw() {
        ctx.globalAlpha = this.life;
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.size, this.size);
        ctx.globalAlpha = 1;
    }
}

class Dino {
    constructor() {
        this.x = 80; this.y = GROUND_Y;
        this.width = 140; this.height = 140;
        this.velocityY = 0; this.isJumping = false;
    }
    jump() {
        if (!this.isJumping && !gameOver) {
            this.velocityY = -18;
            this.isJumping = true;
            jumpSound.currentTime = 0; jumpSound.play().catch(()=>{});
            if (music.paused) music.play().catch(()=>{});
        }
    }
    update() {
        this.velocityY += 0.8;
        this.y += this.velocityY;
        if (this.y >= GROUND_Y) { this.y = GROUND_Y; this.isJumping = false; }
    }
    draw() { ctx.drawImage(dinoImg, this.x, this.y, this.width, this.height); }
    getHitbox() { return { x: this.x + 35, y: this.y + 30, width: this.width - 70, height: this.height - 40 }; }
}

class Cactus {
    constructor(speed) {
        this.x = LOGICAL_WIDTH;
        this.width = 80; this.height = 110;
        this.y = GROUND_Y + 25;
        this.speed = speed;
    }
    update() { this.x -= this.speed; }
    draw() { ctx.drawImage(cactusImg, this.x, this.y, this.width, this.height); }
    getHitbox() { return { x: this.x + 15, y: this.y + 15, width: this.width - 30, height: this.height - 25 }; }
}

let dino = new Dino();
let obstacles = [];
let frame = 0, score = 0, speed = 7, gameOver = false;

function update() {
    if (gameOver) {
        particles.forEach((p, i) => { p.update(); if(p.life <= 0) particles.splice(i, 1); });
        if (shakeAmount > 0) shakeAmount -= 0.8;
        return;
    }
    frame++;
    if(frame % 2 === 0) score++;
    cloudX -= speed * 0.3; // Background movement
    if (cloudX <= -LOGICAL_WIDTH) cloudX = 0;

    if (frame % 80 === 0) {
        obstacles.push(new Cactus(speed));
        if(speed < 22) speed += 0.3;
    }
    dino.update();
    obstacles.forEach((obs, i) => {
        obs.update();
        const a = dino.getHitbox();
        const b = obs.getHitbox();
        if (a.x < b.x + b.width && a.x + a.width > b.x && a.y < b.y + b.height && a.y + a.height > b.y) {
            triggerExplosion(obs);
        }
        if (obs.x + obs.width < 0) obstacles.splice(i, 1);
    });
}

function triggerExplosion(obs) {
    gameOver = true;
    shakeAmount = 20; // Screen shake power
    for (let i = 0; i < 40; i++) particles.push(new Particle(obs.x + 40, obs.y + 40));
    
    flash.style.display = "block";
    flashTimeout = setTimeout(() => flash.style.display = "none", 150);
    
    music.pause();
    hitSound.play().catch(()=>{});
    boomTimeout = setTimeout(() => {
        if (gameOver) { boomSound.currentTime = 0; boomSound.play().catch(()=>{}); }
    }, 300);
    
    finalScoreText.innerText = "SCORE: " + score;
    setTimeout(() => { overlay.style.display = "flex"; }, 500);
}

function draw() {
    ctx.save();
    if (shakeAmount > 0) ctx.translate((Math.random()-0.5)*shakeAmount, (Math.random()-0.5)*shakeAmount);
    
    ctx.clearRect(0, 0, LOGICAL_WIDTH, LOGICAL_HEIGHT);
    
    // Draw clouds/background
    ctx.fillStyle = "rgba(255,255,255,0.4)";
    ctx.fillRect(cloudX + 100, 50, 150, 30);
    ctx.fillRect(cloudX + 500, 80, 200, 40);
    ctx.fillRect(cloudX + LOGICAL_WIDTH + 100, 50, 150, 30);

    // Ground Line
    ctx.strokeStyle = "#333"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y + 130); ctx.lineTo(LOGICAL_WIDTH, GROUND_Y + 130); ctx.stroke();

    dino.draw();
    obstacles.forEach(o => o.draw());
    particles.forEach(p => p.draw());
    
    ctx.restore();

    ctx.fillStyle = "black"; ctx.font = "bold 30px sans-serif";
    ctx.fillText("SCORE: " + score, 40, 50);
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

setupCanvas();
window.addEventListener('resize', setupCanvas);
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); dino.jump(); });
canvas.addEventListener("mousedown", () => { if(!gameOver) dino.jump(); });

function resetGame() {
    clearTimeout(flashTimeout); clearTimeout(boomTimeout);
    boomSound.pause(); boomSound.currentTime = 0;
    overlay.style.display = "none"; flash.style.display = "none";
    dino = new Dino(); obstacles = []; particles = [];
    frame = 0; score = 0; speed = 7; shakeAmount = 0;
    gameOver = false;
    music.currentTime = 0; music.play().catch(()=>{});
}

let loaded = 0;
const check = () => { if(++loaded >= 2) loop(); };
dinoImg.onload = check; cactusImg.onload = check;
</script>
</body>
</html>
